baseURL = "https://kktae.github.io/"
languageCode = "ko"
title = "kktae.io"
theme = "PaperMod"
enableRobotsTXT = true
summaryLength = 30

[pagination]
  pagerSize = 10

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  defaultTheme = "dark"
  ShowShareButtons = false
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowToc = true
  TocOpen = true
  ShowRssButtonInSectionTermList = false
  description = "Cloud & Infrastructure Engineer"
  githubRepo = "kktae/kktae.github.io"

  [params.homeInfoParams]
    Title = "kktae"
    Content = "Cloud & Infrastructure Engineer — GCP, Kubernetes, SRE"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/kktae"

  [params.assets]
    disableFingerprinting = false

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[[menu.main]]
  identifier = "archives"
  name = "Archives"
  url = "/archives/"
  weight = 5

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "series"
  name = "Series"
  url = "/series/"
  weight = 30

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 40

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 50

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.cjk]
        enable = true
        eastAsianLineBreaks = true
        eastAsianLineBreaksStyle = "simple"
        escapedSpace = true
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
