<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>{{ .Title }} — 전체 시리즈 PDF</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css');
    body {
      font-family: 'Pretendard', sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      font-size: 11pt;
      line-height: 1.7;
      color: #1a1a1a;
    }
    h1 { font-size: 1.8rem; border-bottom: 2px solid #333; padding-bottom: 0.5rem; }
    h2 { font-size: 1.4rem; margin-top: 2rem; }
    h3 { font-size: 1.15rem; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; font-size: 0.9em; }
    th, td { border: 1px solid #ddd; padding: 0.5rem 0.75rem; text-align: left; }
    th { background: #f5f5f5; font-weight: 600; }
    code { font-size: 0.85em; background: #f5f5f5; padding: 0.15rem 0.3rem; border-radius: 3px; }
    pre { background: #f5f5f5; padding: 1rem; border-radius: 6px; overflow-x: auto; font-size: 0.85em; }
    blockquote { border-left: 3px solid #ddd; margin: 1rem 0; padding: 0.5rem 1rem; color: #555; }
    img { max-width: 100%; }
    .page-break { page-break-before: always; }
    .toc-header { margin-bottom: 2rem; }
    .toc-list { list-style: none; padding: 0; }
    .toc-list li { padding: 0.3rem 0; }
    .toc-list a { color: #333; text-decoration: none; }
    @media print {
      body { padding: 0; }
      .no-print { display: none; }
    }
  </style>
</head>
<body>
  <div class="no-print" style="text-align:center;margin-bottom:2rem;padding:1rem;background:#f0f7ff;border-radius:8px;">
    <p style="margin:0 0 0.5rem"><strong>{{ .Title }}</strong> — 전체 시리즈</p>
    <button onclick="window.print()" style="padding:0.5rem 2rem;font-size:1rem;cursor:pointer;border:1px solid #333;border-radius:6px;background:#fff;">PDF로 저장</button>
  </div>

  <h1 class="toc-header">{{ .Title }}</h1>

  {{- $section := .CurrentSection }}
  {{- $posts := where $section.Pages "File.BaseFileName" "!=" "print" }}
  {{- $posts = $posts.ByDate }}

  <h2>목차</h2>
  <ol class="toc-list">
    {{- range $posts }}
    <li><a href="#{{ .File.BaseFileName }}">{{ .Title }}</a></li>
    {{- end }}
  </ol>

  {{- range $posts }}
  <div class="page-break" id="{{ .File.BaseFileName }}">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
  </div>
  {{- end }}
</body>
</html>
