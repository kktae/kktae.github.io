<script type="module">
  if (document.querySelector('pre.mermaid')) {
    import('https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs')
      .then(m => {
        m.default.initialize({
          startOnLoad: true,
          theme: document.body.className.includes('dark') ? 'dark' : 'default'
        });
        m.default.run();
      });
  }
</script>
