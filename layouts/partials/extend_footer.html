<script type="module">
  if (document.querySelector('pre.mermaid')) {
    import('https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs')
      .then(m => {
        m.default.initialize({
          startOnLoad: true,
          theme: document.body.className.includes('dark') ? 'dark' : 'default'
        });
        m.default.run();
      });
  }
</script>

<script>
  // Sidebar TOC — highlight current section
  (() => {
    const sidebar = document.querySelector('.toc-sidebar-inner');
    if (!sidebar) return;

    const links = sidebar.querySelectorAll('a');
    if (!links.length) return;

    const headings = [];
    links.forEach(link => {
      const id = decodeURIComponent(link.getAttribute('href')?.replace('#', '') || '');
      const el = document.getElementById(id);
      if (el) headings.push({ el, link });
    });

    if (!headings.length) return;

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          links.forEach(l => l.classList.remove('active'));
          const match = headings.find(h => h.el === entry.target);
          if (match) match.link.classList.add('active');
        }
      });
    }, { rootMargin: '-80px 0px -70% 0px' });

    headings.forEach(h => observer.observe(h.el));
  })();

  // Timeline TOC — highlight current year/month
  (() => {
    const toc = document.querySelector('.timeline-toc-inner');
    if (!toc) return;

    const links = toc.querySelectorAll('a');
    if (!links.length) return;

    const anchors = [];
    links.forEach(link => {
      const id = decodeURIComponent(link.getAttribute('href')?.replace('#', '') || '');
      const el = document.getElementById(id);
      if (el) anchors.push({ el, link });
    });

    if (!anchors.length) return;

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          links.forEach(l => l.classList.remove('active'));
          const match = anchors.find(a => a.el === entry.target);
          if (match) match.link.classList.add('active');
        }
      });
    }, { rootMargin: '-80px 0px -70% 0px' });

    anchors.forEach(a => observer.observe(a.el));
  })();
</script>
