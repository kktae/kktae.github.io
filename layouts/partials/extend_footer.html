<script type="module">
  if (document.querySelector('pre.mermaid')) {
    import('https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.esm.min.mjs')
      .then(m => {
        m.default.initialize({
          startOnLoad: false,
          theme: document.body.className.includes('dark') ? 'dark' : 'default'
        });
        m.default.run();
      });
  }
</script>

<script>
  // TOC sidebar — highlight current section on scroll
  function initTocHighlight(containerSelector) {
    const container = document.querySelector(containerSelector);
    if (!container) return;

    const links = container.querySelectorAll('a');
    if (!links.length) return;

    const targets = [];
    links.forEach(link => {
      const id = decodeURIComponent(link.getAttribute('href')?.replace('#', '') || '');
      const el = document.getElementById(id);
      if (el) targets.push({ el, link });
    });

    if (!targets.length) return;

    let current = null;
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const match = targets.find(t => t.el === entry.target);
          if (match && match.link !== current) {
            if (current) current.classList.remove('active');
            match.link.classList.add('active');
            current = match.link;
          }
        }
      });
    }, { rootMargin: '-80px 0px -70% 0px' });

    targets.forEach(t => observer.observe(t.el));
  }

  initTocHighlight('.toc-sidebar-inner');
  initTocHighlight('.timeline-toc-inner');
</script>
